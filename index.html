<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Soporte Médico y Dental</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--az:#1a3a5c;--azc:#2e6da4;--azs:#e8f1f9;--gr:#f4f6f8;--grb:#dce3ea;--tx:#1c2b3a;--txs:#5a7087;--ve:#1a7a4a;--ro:#c0392b;--na:#e67e22;--tl:#1a6b5a;--sh:0 2px 12px rgba(26,58,92,.10);--ra:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gr);color:var(--tx);min-height:100vh}
button{cursor:pointer;font-family:inherit}
.nav{background:var(--az);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-logo{font-size:18px;font-weight:700}.nav-sub{font-size:12px;opacity:.7;margin-top:1px}
.nav-back{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-size:14px;margin-right:auto}
.nav-back:hover{background:rgba(255,255,255,.25)}
.inicio{padding:24px 20px;max-width:700px;margin:0 auto}
.inicio-header{text-align:center;margin-bottom:28px}
.inicio-header h2{font-size:20px;color:var(--az);font-weight:700}
.inicio-header p{font-size:14px;color:var(--txs);margin-top:4px}
.sec-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txs);margin:20px 0 10px;padding-left:2px}
.tarjetas{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tarjeta{background:#fff;border-radius:var(--ra);padding:16px 14px;border:1.5px solid var(--grb);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px}
.tarjeta:hover,.tarjeta:active{border-color:var(--azc);background:var(--azs);transform:translateY(-1px);box-shadow:var(--sh)}
.tarjeta-icono{font-size:22px}.tarjeta-nombre{font-size:14px;font-weight:600;color:var(--az)}.tarjeta-desc{font-size:12px;color:var(--txs)}
.tarjeta.mant{border-left:3px solid var(--na)}.tarjeta.cg{border-left:3px solid var(--tl)}.tarjeta.sm{border-left:3px solid var(--azc)}
.btn-menu{background:#fff;border:1.5px dashed var(--grb);border-radius:var(--ra);padding:12px 16px;width:100%;text-align:left;font-size:14px;color:var(--txs);margin-top:8px;display:flex;align-items:center;gap:8px}
.btn-menu:hover{border-color:var(--azc);color:var(--az)}
.form-page{padding:20px;max-width:700px;margin:0 auto}
.form-titulo{font-size:17px;font-weight:700;margin-bottom:4px;line-height:1.3}
.form-sub{font-size:13px;color:var(--txs);margin-bottom:20px}
.form-card{background:#fff;border-radius:var(--ra);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
.form-card h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txs);margin-bottom:14px}
.campo{margin-bottom:14px}
.campo label{display:block;font-size:13px;font-weight:600;color:var(--tx);margin-bottom:5px}
.campo label .req{color:var(--ro)}
.campo input,.campo select,.campo textarea{width:100%;padding:10px 12px;border:1.5px solid var(--grb);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--tx);transition:border-color .15s}
.campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:var(--azc)}
.campo textarea{resize:vertical;min-height:80px}
.campo-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fecha-item{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.fecha-item input{flex:1}
.btn-rm{background:none;border:none;color:var(--ro);font-size:20px;padding:0 4px;line-height:1;cursor:pointer}
.btn-add-sm{background:none;border:1.5px dashed var(--azc);color:var(--azc);border-radius:8px;padding:7px 14px;font-size:13px;width:100%;margin-top:2px}
.btn-add-sm:hover{background:var(--azs)}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--azc);border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.ac-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--grb)}
.ac-item:hover{background:var(--azs)}.ac-item:last-child{border-bottom:none}
.info-box{background:var(--azs);border-radius:8px;padding:10px 12px;font-size:13px;margin-top:6px;color:var(--tx);display:none}
.info-box.vis{display:block}
.info-box span{display:block;color:var(--txs);font-size:12px;margin-top:2px}
.item-row{background:var(--gr);border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative;display:grid;grid-template-columns:1fr 150px;gap:10px;align-items:start}
.item-row .btn-rm{position:absolute;top:6px;right:4px}
.chk-grupo{margin-bottom:14px}
.chk-grupo-tit{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--txs);margin-bottom:8px;letter-spacing:.5px;padding:6px 10px;background:var(--gr);border-radius:6px}
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:7px 4px;border-bottom:1px solid var(--grb)}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{width:18px;height:18px;min-width:18px;margin-top:1px;accent-color:var(--azc)}
.chk-item label{font-size:13px;flex:1;cursor:pointer}
.monto-tabla{width:100%;border-collapse:collapse;margin-top:10px}
.monto-tabla td{padding:6px 8px;font-size:14px}
.monto-tabla .lbl{color:var(--txs)}.monto-tabla .val{text-align:right;font-weight:600}
.monto-tabla tr.tot td{font-size:16px;font-weight:700;color:var(--az);border-top:2px solid var(--grb);padding-top:10px}
.acciones{display:flex;gap:10px;margin-top:20px;margin-bottom:30px}
.btn-pri{flex:1;background:var(--az);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600}
.btn-pri:hover{background:var(--azc)}.btn-pri:disabled{background:#888;cursor:not-allowed}
.btn-sec{background:#fff;color:var(--az);border:1.5px solid var(--az);border-radius:10px;padding:14px;font-size:15px;font-weight:600}
/* PREVIEW */
.preview-page{padding:0}
.prev-toolbar{background:#fff;padding:12px 20px;display:flex;gap:10px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.08);position:sticky;top:60px;z-index:50;flex-wrap:wrap}
.btn-guardar{background:var(--ve);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600}
.btn-guardar:disabled{background:#888;cursor:not-allowed}
.btn-editar{background:#fff;color:var(--az);border:1.5px solid var(--az);border-radius:8px;padding:10px 16px;font-size:14px}
.doc-num-label{font-size:13px;color:var(--txs);margin-left:auto}
/* DOCUMENTO */
.doc-wrap{background:#fff;max-width:780px;margin:20px auto;box-shadow:0 4px 24px rgba(0,0,0,.12);font-family:'Segoe UI',Arial,sans-serif}
/* Header: logo izq + empresa centro + número der */
.doc-hdr{color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px}
.doc-hdr.sm{background:var(--az)}.doc-hdr.cg{background:var(--tl)}
.doc-hdr-logo{flex-shrink:0}
.doc-hdr-logo img{height:52px;max-width:160px;object-fit:contain}
.doc-hdr-empresa{flex:1;padding:0 16px}
.doc-hdr-empresa .nombre{font-size:13px;font-weight:700;letter-spacing:.2px}
.doc-hdr-empresa .detalle{font-size:10px;opacity:.8;margin-top:2px;line-height:1.5}
.doc-hdr-numbox{background:rgba(0,0,0,.2);border-radius:6px;padding:8px 16px;text-align:right;flex-shrink:0;min-width:140px}
.doc-hdr-numbox .tipo{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;opacity:.85}
.doc-hdr-numbox .num{font-size:22px;font-weight:800;line-height:1.1}
.doc-hdr-numbox .fecha{font-size:10px;opacity:.8;margin-top:2px}
/* Título tipo debajo del header */
.doc-tipo-bar{text-align:center;padding:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--grb)}
.doc-tipo-bar.sm{color:var(--az)}.doc-tipo-bar.cg{color:var(--tl)}.doc-tipo-bar.mant{color:var(--na)}
.doc-body{padding:18px 24px}
/* Dos columnas cliente/equipo */
.doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.doc-meta-blq{border:1px solid var(--grb);border-radius:6px;overflow:hidden}
.doc-meta-tit{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#fff;padding:5px 10px;margin-bottom:0}
.doc-meta-tit.sm{background:var(--az)}.doc-meta-tit.cg{background:var(--tl)}.doc-meta-tit.mant{background:var(--na)}
.doc-meta-body{padding:8px 10px}
.doc-fila{display:flex;gap:6px;margin-bottom:3px;font-size:12px;line-height:1.4}
.doc-fila .k{color:var(--txs);min-width:60px;flex-shrink:0;font-size:11px}
.doc-fila .v{font-weight:500;color:var(--tx)}
/* Sección título */
.doc-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid;padding:5px 10px 4px;margin:14px 0 8px;border-radius:3px 3px 0 0}
.doc-sec.sm{color:#fff;background:var(--az);border-color:var(--az)}
.doc-sec.cg{color:#fff;background:var(--tl);border-color:var(--tl)}
.doc-sec.mant{color:#fff;background:var(--na);border-color:var(--na)}
.doc-detalle{background:var(--gr);border-radius:0 0 6px 6px;padding:10px 12px;margin-bottom:6px;font-size:13px;line-height:1.6;border:1px solid var(--grb);border-top:none}
/* Tabla ítems cotización - como PDF referencia */
.doc-items{width:100%;border-collapse:collapse;margin-bottom:0;font-size:12px}
.doc-items thead tr{border-bottom:2px solid}
.doc-items.sm thead tr{background:var(--az);border-color:var(--az)}
.doc-items.cg thead tr{background:var(--tl);border-color:var(--tl)}
.doc-items th{color:#fff;padding:7px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.doc-items td{padding:7px 10px;border-bottom:1px solid var(--grb);font-size:12px;vertical-align:top}
.doc-items td.amt{text-align:right;font-weight:600;white-space:nowrap}
.doc-items tr.sub-row td{background:#f9fafb;font-size:11px;color:var(--txs)}
.doc-items tr.tot-row td{font-size:13px;font-weight:700;border-top:2px solid;border-bottom:none;background:var(--gr)}
.doc-items.sm tr.tot-row td{color:var(--az);border-color:var(--az)}
.doc-items.cg tr.tot-row td{color:var(--tl);border-color:var(--tl)}
/* Sección banco + totales (como PDF referencia) */
.doc-totales-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:8px;border:1px solid var(--grb);border-radius:6px;overflow:hidden}
.doc-banco{padding:10px 12px;font-size:11px;line-height:1.7;color:var(--tx);background:#f9fafb}
.doc-banco strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--txs);margin-bottom:4px}
.doc-montos{display:flex;flex-direction:column;border-left:1px solid var(--grb)}
.doc-monto-fila{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid var(--grb);font-size:12px}
.doc-monto-fila:last-child{border-bottom:none}
.doc-monto-fila.total{font-size:14px;font-weight:700}
.doc-monto-fila.total.sm{background:var(--az);color:#fff}
.doc-monto-fila.total.cg{background:var(--tl);color:#fff}
.doc-monto-lbl{color:var(--txs);font-size:11px}
.doc-monto-val{font-weight:600;text-align:right}
/* Checklist doc */
.chk-doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:10px}
.chk-doc-row{display:flex;align-items:flex-start;gap:5px;padding:4px 8px;border-radius:3px;font-size:11px;line-height:1.4;border:1px solid transparent}
.chk-doc-row.ok{background:#e8f5ee;border-color:#c3e6cb}
.chk-doc-row.no{background:#f4f6f8;border-color:var(--grb);color:var(--txs)}
/* Tabla resumen mantención */
.resumen-tabla{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.resumen-tabla th{color:#fff;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase}
.resumen-tabla td{padding:6px 10px;border-bottom:1px solid var(--grb);vertical-align:top;font-size:12px}
.resumen-tabla td:first-child{width:60px;text-align:center;font-size:14px}
/* FIRMAS - estilo PDF referencia */
.firmas-seccion{margin-top:24px;padding-top:20px;border-top:2px solid var(--grb);display:grid;grid-template-columns:1fr 1fr;gap:32px}
.firma-bloque{display:flex;flex-direction:column;align-items:center;gap:4px}
.firma-linea{width:100%;border-bottom:1.5px solid var(--tx);margin:4px 0 3px}
.firma-label{font-size:11px;color:var(--txs);text-align:center;font-style:italic}
.firma-nombre-bold{font-size:13px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.3px;color:var(--tx)}
.firma-canvas-wrap{border:1.5px dashed var(--grb);border-radius:6px;background:var(--gr);width:100%;padding:5px;display:flex;flex-direction:column;align-items:center;gap:4px}
.firma-canvas-wrap canvas{background:#fff;border-radius:4px;touch-action:none;cursor:crosshair;width:100%;height:90px}
.btn-limpiar{background:none;border:1px solid var(--grb);border-radius:5px;padding:3px 10px;font-size:11px;color:var(--txs)}
.firma-nombre-input{width:100%;border:none;border-bottom:1.5px solid var(--tx);padding:4px 2px;font-size:12px;text-align:center;background:transparent;font-family:inherit;color:var(--tx);text-transform:uppercase}
.firma-nombre-input:focus{outline:none;border-color:var(--azc)}
.firma-tec-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%}
.firma-tec-wrap img.firma-img{max-height:50px;object-fit:contain}
.firma-tec-wrap img.timbre-img{max-height:40px;object-fit:contain;opacity:.9}
/* MANTENEDOR */
.mant-page{padding:20px;max-width:700px;margin:0 auto}
.mant-tabs{display:flex;gap:8px;margin-bottom:20px}
.mant-tab{background:#fff;border:1.5px solid var(--grb);border-radius:8px;padding:8px 18px;font-size:14px;font-weight:500;color:var(--txs)}
.mant-tab.on{background:var(--az);color:#fff;border-color:var(--az)}
.mant-lista{background:#fff;border-radius:var(--ra);box-shadow:var(--sh);overflow:hidden}
.mant-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--grb);font-size:14px}
.mant-item:last-child{border-bottom:none}
.mant-item-nombre{font-weight:600}.mant-item-sub{font-size:12px;color:var(--txs);margin-top:2px}
.btn-edit{background:none;border:1.5px solid var(--grb);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--txs);white-space:nowrap;margin-left:8px}
.btn-add-main{background:var(--az);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:600;margin-bottom:14px}
.mant-buscar{width:100%;padding:10px 14px;border:1.5px solid var(--grb);border-radius:8px;font-size:14px;margin-bottom:10px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.off{display:none}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--az)}
.btn-cancel{width:100%;margin-top:8px;background:none;border:1.5px solid var(--grb);border-radius:10px;padding:12px;font-size:15px;color:var(--txs)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.vis{opacity:1}.toast.ok{background:var(--ve)}.toast.err{background:var(--ro)}
/* PROGRESO */
.prog-bg{position:fixed;inset:0;background:rgba(26,58,92,.75);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px}
.prog-bg.off{display:none}
.spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-msg{font-size:16px;font-weight:600}.prog-sub{font-size:13px;opacity:.8}
.config-card{background:#fff8e6;border:1.5px solid #f0c030;border-radius:var(--ra);padding:14px;margin-bottom:14px;font-size:13px;color:#7a5a00;line-height:1.6}
.config-card a{color:var(--azc)}
@media(max-width:480px){.tarjetas,.doc-meta,.campo-row,.firmas-seccion,.chk-doc-grid,.item-row{grid-template-columns:1fr}}
</style>
</head>

<div id="toast" class="toast"></div>
<div id="prog" class="prog-bg off">

  <div class="prog-sub" id="progSub"></div>
</div>
<div id="modalBg" class="modal-bg off"><div class="modal" id="modalCont"></div></div>

// ══ CORRELATIVOS SINCRONIZADOS EN DROPBOX ══
const CORR_PATH='/Soporte Medico/config/correlativos.json';
const CORR_DEF={cot_sm:1248,inf_sm:652,cot_cg:222,inf_cg:227,mant_sillon:1,mant_bomba:1,mant_concentrador:1};
let corrCache=null;

async function loadCorr(){
  const tok=getToken();
  if(!tok){corrCache={...CORR_DEF};return;}
  try{
    const r=await fetch('https://dropbox-proxy.kenia-benavides.workers.dev',{
      method:'POST',
      headers:{'Authorization':'Bearer '+tok,'Dropbox-API-Arg':JSON.stringify({path:CORR_PATH}),'X-Dropbox-URL':'https://content.dropboxapi.com/2/files/download'}
    });
    corrCache=r.ok?await r.json():{...CORR_DEF};
  }catch{corrCache={...CORR_DEF};}
}
async function saveCorr(){
  const tok=getToken();if(!tok||!corrCache)return;
  await fetch('https://dropbox-proxy.kenia-benavides.workers.dev',{
    method:'POST',
    headers:{'Authorization':'Bearer '+tok,'Dropbox-API-Arg':JSON.stringify({path:CORR_PATH,mode:'overwrite',mute:true}),'Content-Type':'application/octet-stream','X-Dropbox-URL':'https://content.dropboxapi.com/2/files/upload'},
    body:JSON.stringify(corrCache)
  }).catch(()=>{});
}
function peekCorr(k){return corrCache?String(corrCache[k]||CORR_DEF[k]||1).padStart(5,'0'):'-----';}
function nextCorr(k){
  if(!corrCache)corrCache={...CORR_DEF};
  const n=corrCache[k]||CORR_DEF[k]||1;
  corrCache[k]=n+1;
  return String(n).padStart(5,'0');
}

function getBDKey(t){return{cot_sm:'cot_sm',inf_sm:'inf_sm',cot_cg:'cot_cg',inf_cg:'inf_cg',mant_sillon:'mant',mant_bomba:'mant',mant_concentrador:'mant'}[t]||t;}
function addBD(k,r){try{const b=JSON.parse(localStorage.getItem('bd_'+k)||'[]');b.push(r);localStorage.setItem('bd_'+k,JSON.stringify(b));}catch{}}
function getToken(){return localStorage.getItem('dbx_token')||'';}

// ══ HELPERS ══
function hoy(){return new Date().toISOString().split('T')[0];}
function fmtF(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}-${m}-${y}`;}
function fmtP(n){return'$ '+Math.round(n||0).toLocaleString('es-CL');}
function san(s){return(s||'').replace(/[/\\:*?"<>|]/g,'-').trim();}
function normPath(s){
  // Elimina tildes y caracteres especiales para rutas Dropbox
  return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[/\\\\:*?"<>|]/g,'-').trim();
}
function esCot(t){return t==='cot_sm'||t==='cot_cg';}
function esMant(t){return t.startsWith('mant_');}
function esCG(t){return t==='cot_cg'||t==='inf_cg';}

// Técnico determina logo/firma/timbre
function tecnicoEsCG(tec){return tec&&tec.includes('Guzmán');}
function getLogo(tipo,tec){return(esCG(tipo)||tecnicoEsCG(tec))?IMG.logo_cg:IMG.logo_sm;}
function getFirmaTimbre(tec){return tecnicoEsCG(tec)?{firma:IMG.firma_t,timbre:IMG.timbre_cg}:{firma:IMG.firma_t,timbre:IMG.timbre_sm};}
function getEmpresa(tipo,tec){return(esCG(tipo)||tecnicoEsCG(tec))?E_CG:E_SM;}
function getHdrCls(tipo,tec){return(esCG(tipo)||tecnicoEsCG(tec))?'cg':'sm';}
function getSecCls(tipo,tec){return esMant(tipo)?'mant':(esCG(tipo)||tecnicoEsCG(tec))?'cg':'sm';}

function addItem(){
  const c=document.getElementById('itemsCont');
  const d=document.createElement('div');d.className='item-row';
  d.innerHTML=`<button class="btn-rm" onclick="this.parentElement.remove();calcSM();calcCG()">×</button>
    <div class="campo" style="margin:0"><label style="font-size:12px">Descripción</label><input type="text" placeholder="Descripción..."></div>
    <div class="campo" style="margin:0"><label style="font-size:12px">Valor (CLP)</label><input type="number" style="text-align:right" placeholder="0" oninput="calcSM();calcCG()"></div>`;
  c.appendChild(d);
}
function calcSM(){
  let sub=0;document.querySelectorAll('#itemsCont .item-row input[type=number]').forEach(i=>sub+=parseFloat(i.value)||0);
  const iva=Math.round(sub*.19);
  const s=document.getElementById('cSub'),iv=document.getElementById('cIva'),t=document.getElementById('cTot');
  if(s)s.textContent=fmtP(sub);if(iv)iv.textContent=fmtP(iva);if(t)t.textContent=fmtP(sub+iva);
}
function calcCG(){
  const hon=parseFloat(document.getElementById('iHon')?.value)||0;
  const pct=parseFloat(document.getElementById('iRetPct')?.value)||14.5;
  const ret=Math.round(hon*pct/100);
  const h=document.getElementById('cHon'),r=document.getElementById('cRet'),tc=document.getElementById('cTotCG');
  if(h)h.textContent=fmtP(hon);if(r)r.textContent=fmtP(ret);if(tc)tc.textContent=fmtP(hon-ret);
}
function getItems(tipo){
  const items=[];
  document.querySelectorAll('#itemsCont .item-row').forEach(r=>{
    const txt=r.querySelector('input[type=text]');const num=r.querySelector('input[type=number]');
    const desc=(txt?.value||'').trim();const val=parseFloat(num?.value)||0;
    if(desc||val)items.push({desc,val});
  });
  if(tipo==='cot_cg'){
    const hon=parseFloat(document.getElementById('iHon')?.value)||0;
    const pct=parseFloat(document.getElementById('iRetPct')?.value)||14.5;
    const ret=Math.round(hon*pct/100);
    return{cg:true,items,honorario:hon,pct,retencion:ret,total:hon-ret,tipo_pago:document.getElementById('iTipoPago')?.value||'Boleta'};
  }
  const sub=items.reduce((a,i)=>a+i.val,0);const iva=Math.round(sub*.19);
  return{items,subtotal:sub,iva,total:sub+iva,tipo_pago:document.getElementById('iTipoPago')?.value||'Factura'};
}

// ══ FIRMA ══
let firmaData=null;
function initFirma(){
  const cv=document.getElementById('firmaCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');let draw=false,lx=0,ly=0;
  function pos(e){const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;
    return e.touches?[(e.touches[0].clientX-r.left)*sx,(e.touches[0].clientY-r.top)*sy]:[(e.clientX-r.left)*sx,(e.clientY-r.top)*sy];}
  function start(e){e.preventDefault();draw=true;[lx,ly]=pos(e);}
  function move(e){if(!draw)return;e.preventDefault();const[x,y]=pos(e);
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.strokeStyle='#1a3a5c';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();[lx,ly]=[x,y];}
  function end(){draw=false;firmaData=cv.toDataURL('image/png');}
  cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',end);
  cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
}
function limpiarFirma(){const cv=document.getElementById('firmaCanvas');if(cv){cv.getContext('2d').clearRect(0,0,cv.width,cv.height);firmaData=null;}}

async function guardar(){
  const tok=getToken();
  if(!tok){toast('Configura el token de Dropbox primero','err');modalDropbox();return;}

  const cv=document.getElementById('firmaCanvas');if(cv)firmaData=cv.toDataURL('image/png');

  // Inyectar firma en el doc antes de generar PDF

  if(fw&&firmaData&&!document.getElementById('firmaImgFinal')){
    const img=document.createElement('img');img.id='firmaImgFinal';img.src=firmaData;
    img.style.cssText='max-width:100%;border:1px solid #dce3ea;border-radius:6px;background:#fff;max-height:100px;';
    const cvEl=fw.querySelector('#firmaCanvas');if(cvEl){cvEl.style.display='none';fw.insertBefore(img,cvEl);}

      ni.style.display='none';ni.parentElement.appendChild(sp);

  const doc=currentDoc;
  const num=nextCorr(doc.tipo);
  doc.numero=num;
  const nd=document.getElementById('docNumDisp');if(nd)nd.textContent=`N° ${num}`;

  const btn=document.getElementById('btnG');
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}

  addBD(getBDKey(doc.tipo),{...doc,firma:firmaData?'si':'no',firmante:nomFirmante,ts:new Date().toISOString()});
  showProg('Generando PDF...','Puede tomar 15-20 segundos');

  try{
    const el=document.getElementById('docPDF');
    const pdfBlob=await html2pdf().set({
      margin:[6,6,6,6],filename:`${LABEL_A[doc.tipo]} N°${num}.pdf`,
      image:{type:'jpeg',quality:0.95},
      html2canvas:{scale:2,useCORS:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(el).outputPdf('blob');

    showProg('Subiendo a Dropbox...','Creando carpetas automáticamente');

    const[anio,mesNum,dia]=doc.fecha_doc.split('-');
    const meses=['1. Enero','2. Febrero','3. Marzo','4. Abril','5. Mayo','6. Junio','7. Julio','8. Agosto','9. Septiembre','10. Octubre','11. Noviembre','12. Diciembre'];
    const nombreMes=meses[parseInt(mesNum)-1];
    const fechaFmt=`${dia}-${mesNum}-${anio}`;
    const nomCli=normPath(doc.cliente.n);
    const lblArch=normPath(LABEL_A[doc.tipo]);
    const carpeta=`${fechaFmt} ${lblArch} N°${num}`;
    const archivo=`${lblArch} N°${num}.pdf`;
    const ruta=`/Soporte Medico/${nomCli}/${anio}/${nombreMes}/${carpeta}/${archivo}`;

    const buf=await pdfBlob.arrayBuffer();
    const resp=await fetch('https://dropbox-proxy.kenia-benavides.workers.dev',{
      method:'POST',
      headers:{
        'Authorization':'Bearer '+tok,
        'Dropbox-API-Arg':JSON.stringify({path:ruta,mode:'overwrite',autorename:true,mute:false}),
        'Content-Type':'application/octet-stream',
        'X-Dropbox-URL':'https://content.dropboxapi.com/2/files/upload'
      },body:buf
    });

    if(resp.ok){
      await saveCorr();
      // Guardar en Excel BD
      showProg('Actualizando base de datos...','Registrando en el Excel de Dropbox');
      await guardarEnExcel(doc,num);
      hideProg();
      toast(`✓ ${lblArch} N°${num} guardado`,'ok');
      document.querySelector('.doc-num-label').textContent=`${lblArch} N° ${num} — Guardado ✓`;
      if(btn){btn.textContent='✓ Guardado';btn.style.background='var(--ve)';}
      setTimeout(()=>{renderInicio();showPg('pgInicio');},2800);
    }else{
      const err=await resp.json().catch(()=>({}));
      hideProg();
      const msg=err.error_summary||err.error||'Error desconocido';
      if(msg.includes('expired')||msg.includes('invalid_access_token')){toast('Token expirado. Reconfigura Dropbox.','err');modalDropbox();}
      else toast('Error Dropbox: '+msg,'err');
      if(btn){btn.disabled=false;btn.textContent='💾 Guardar PDF en Dropbox';}
      if(corrCache&&corrCache[doc.tipo])corrCache[doc.tipo]--;
    }
  }catch(e){
    hideProg();
    let msg=e.message||'Error desconocido';
    if(msg.toLowerCase().includes('fetch')||msg.toLowerCase().includes('failed')){
      msg='Error de conexión. Verifica: 1) Tienes internet, 2) El token de Dropbox es válido, 3) Estás abriendo el archivo desde un servidor (no directamente desde tu escritorio como archivo local)';
    }
    toast('Error: '+msg,'err');
    if(btn){btn.disabled=false;btn.textContent='💾 Guardar PDF en Dropbox';}
    if(corrCache&&corrCache[doc.tipo])corrCache[doc.tipo]--;
  }
}


// ══ GUARDAR EN EXCEL BD (Dropbox) ══
const EXCEL_PATH='/Soporte Medico/Registro historico informes, cotizaciones y mantencion.xlsm';

async function guardarEnExcel(doc,num){
  const tok=getToken();if(!tok)return;
  try{
    // Descargar el archivo Excel actual
    const dlResp=await fetch('https://dropbox-proxy.kenia-benavides.workers.dev',{
      method:'POST',
      headers:{'Authorization':'Bearer '+tok,'Dropbox-API-Arg':JSON.stringify({path:EXCEL_PATH}),'X-Dropbox-URL':'https://content.dropboxapi.com/2/files/download'}
    });
    if(!dlResp.ok){console.warn('No se pudo descargar el Excel BD');return;}
    const xlsxBuf=await dlResp.arrayBuffer();

    // Usar SheetJS para agregar la fila
    const XLSX=window.XLSX;
    if(!XLSX){console.warn('SheetJS no disponible');return;}

    const wb=XLSX.read(new Uint8Array(xlsxBuf),{type:'array',cellDates:true});
    const tipo=doc.tipo;
    const cli=doc.cliente;
    const equ=doc.equipo;
    const empresa=esCG(tipo)||tecnicoEsCG(doc.tec)?'Carlos Guzmán Palma':'Soporte Médico';
    const fechasServStr=Array.isArray(doc.fechas_serv)?doc.fechas_serv.map(fmtF).join(' / '):doc.fechas_serv||'';

    let sheetName='';let newRow=[];
    if(tipo==='cot_sm'){
      sheetName='BD_cotización';
      const m=doc.items||{};
      const detalles=m.items?m.items.map(i=>i.desc).join(' / '):'';
      newRow=[null,num,doc.fecha_doc,cli.n+(cli.d?' - '+cli.d:''),cli.n,cli.r,cli.a,cli.t,cli.e,
        fechasServStr,equ.l,equ.l,equ.m,equ.o,equ.s,doc.tipo_mant||'',doc.desc_falla||'',detalles,
        m.subtotal||0,m.iva||0,m.total||0,m.tipo_pago||'',doc.fecha_doc?doc.fecha_doc.substring(0,4):''];
    } else if(tipo==='inf_sm'){
      sheetName='BD_informe';
      const detalles=(doc.procs||[]).join(' / ');
      newRow=[null,num,doc.fecha_doc,cli.n+(cli.d?' - '+cli.d:''),cli.n,cli.r,cli.a,cli.t,cli.e,
        fechasServStr,equ.l,equ.l,equ.m,equ.o,equ.s,doc.tipo_mant||'',doc.desc_falla||'',detalles,doc.resultado||''];
    } else if(tipo==='cot_cg'){
      sheetName='BD_cotización_CG';
      const m=doc.items||{};
      const detalles=m.items?m.items.map(i=>i.desc).join(' / '):'';
      newRow=[null,num,doc.fecha_doc,cli.n+(cli.d?' - '+cli.d:''),cli.n,cli.r,cli.a,cli.t,cli.e,
        fechasServStr,equ.l,equ.l,equ.m,equ.o,equ.s,doc.tipo_mant||'',doc.desc_falla||'',detalles,
        m.honorario||0,m.retencion||0,m.total||0,doc.fecha_doc?doc.fecha_doc.substring(0,4):'',m.pct||14.5,m.tipo_pago||''];
    } else if(tipo==='inf_cg'){
      sheetName='BD_informe_CG';
      const detalles=(doc.procs||[]).join(' / ');
      newRow=[null,num,doc.fecha_doc,cli.n+(cli.d?' - '+cli.d:''),cli.n,cli.r,cli.a,cli.t,cli.e,
        fechasServStr,equ.l,equ.l,equ.m,equ.o,equ.s,doc.tipo_mant||'',doc.desc_falla||'',detalles,doc.resultado||''];
    } else if(esMant(tipo)){
      sheetName='BD_mant';
      const tipoInf=NOMBRES[tipo].replace('\\n',' ');
      const estadoMant=doc.checklist?.resumen?.map(r=>r.item+(r.estado?' ('+r.estado+')':'')).join(', ')||'';
      newRow=[doc.fecha_doc,empresa,tipoInf,cli.n,cli.r,cli.a,cli.t,cli.e,
        equ.t,equ.m,equ.o,equ.s,doc.frecuencia||'',estadoMant];
    }

    if(!sheetName||!wb.SheetNames.includes(sheetName)){
      console.warn('Hoja no encontrada:',sheetName);return;
    }

    const ws=wb.Sheets[sheetName];
    XLSX.utils.sheet_add_aoa(ws,[newRow],{origin:-1}); // append al final

    // Subir Excel modificado
    const outBuf=XLSX.write(wb,{type:'array',bookType:'xlsm',compression:true});
    const upResp=await fetch('https://dropbox-proxy.kenia-benavides.workers.dev',{
      method:'POST',
      headers:{
        'Authorization':'Bearer '+tok,
        'Dropbox-API-Arg':JSON.stringify({path:EXCEL_PATH,mode:'overwrite',mute:true}),
        'Content-Type':'application/octet-stream',
        'X-Dropbox-URL':'https://content.dropboxapi.com/2/files/upload'
      },
      body:new Uint8Array(outBuf)
    });
    if(upResp.ok){console.log('BD Excel actualizado:',sheetName);}
    else{const e=await upResp.json().catch(()=>({}));console.warn('Error subiendo Excel:',e.error_summary||e);}
  }catch(e){console.warn('Error guardarEnExcel:',e.message);}
}

// ══ DROPBOX CONFIG ══
function modalDropbox(){const t=getToken();
  openModal(`<h3>Configurar Dropbox</h3>
    <div class="config-card">
      <strong>⚠️ Cómo abrir la app correctamente</strong><br><br>
      El archivo HTML <strong>NO puede abrirse directamente</strong> desde el escritorio (doble clic). Debes usar una de estas opciones:<br><br>
      <strong>Opción A — Desde Dropbox Web (recomendado):</strong><br>
      Sube el archivo .html a tu Dropbox → ábrelo en dropbox.com → clic en "Abrir" → se abre en el navegador con acceso completo.<br><br>
      <strong>Opción B — Servidor local (PC/Mac):</strong><br>
      Abre Terminal y escribe: <code style="background:#fff;padding:2px 6px;border-radius:4px">python3 -m http.server 8080</code> en la carpeta donde está el archivo. Luego abre <code style="background:#fff;padding:2px 6px;border-radius:4px">http://localhost:8080/soporte_medico_v5.html</code><br><br>
      <strong>¿Cómo obtener el token?</strong><br><br>
      1. Ir a <a href="https://www.dropbox.com/developers/apps" target="_blank">dropbox.com/developers/apps</a><br>
      2. Crear app → <strong>Scoped access</strong> → <strong>Full Dropbox</strong><br>
      3. Nombre ej: "Soporte Médico App" → Create app<br>
      4. Pestaña <strong>Permissions</strong> → activar <strong>files.content.write</strong> y <strong>files.content.read</strong> → Submit<br>
      5. Pestaña <strong>Settings</strong> → sección <em>OAuth 2</em> → <strong>Generate</strong><br>
      6. Copiar y pegar el token aquí
    </div>
    <div class="campo"><label>Access Token</label><input type="password" id="mTok" value="${t}" placeholder="sl.xxxxxxxxx..."></div>
    <button class="btn-pri" style="width:100%;margin-top:8px" onclick="saveTok()">Guardar token</button>
    <button type="button" style="width:100%;margin-top:8px;background:none;border:1.5px solid var(--azc);border-radius:10px;padding:12px;font-size:14px;color:var(--azc)" onclick="testDropbox()">🔍 Probar conexión</button>
    <div id="dbxTestResult" style="margin-top:8px;font-size:13px;display:none"></div>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>`);}
async function testDropbox(){
  const t=document.getElementById('mTok')?.value.trim()||getToken();
  const res=document.getElementById('dbxTestResult');
  if(!res)return;
  if(!t){res.style.display='block';res.style.color='var(--ro)';res.textContent='⚠️ Ingresa el token primero';return;}
  res.style.display='block';res.style.color='var(--txs)';res.textContent='Probando conexión...';
  try{
    const r=await fetch('https://dropbox-proxy.kenia-benavides.workers.dev',{
      method:'POST',
      headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json','X-Dropbox-URL':'https://api.dropboxapi.com/2/users/get_current_account'},
      body:new TextEncoder().encode('null')
    });
    if(r.ok){
      const d=await r.json();
      res.style.color='var(--ve)';
      res.textContent='✅ Conexión OK — Cuenta: '+(d.name?.display_name||d.email||'OK');
    } else if(r.status===401){
      res.style.color='var(--ro)';
      res.innerHTML='❌ Token inválido o expirado (401).<br><strong>Solución:</strong> Ve a dropbox.com/developers/apps → tu app → Settings → OAuth 2 → cambia a <strong>"No expiration"</strong> → Generate → copia el nuevo token aquí.';
    } else {
      const e=await r.json().catch(()=>({}));
      res.style.color='var(--ro)';
      res.textContent='❌ Error '+r.status+': '+(e.error_summary||'desconocido');
    }
  }catch(e){
    res.style.color='var(--ro)';
    if(e.message.includes('fetch')||e.message.includes('Failed')){
      res.textContent='❌ Error de red. Si estás abriendo el archivo como archivo local (file://), debes abrirlo desde un servidor. Ver instrucciones abajo.';
    } else {
      res.textContent='❌ Error: '+e.message;
    }
  }
}
function saveTok(){const t=document.getElementById('mTok').value.trim();if(!t){toast('Ingresa el token','err');return;}localStorage.setItem('dbx_token',t);closeModal();toast('Token guardado','ok');}

// ══ MODAL / TOAST ══
function openModal(html){document.getElementById('modalCont').innerHTML=html;document.getElementById('modalBg').classList.remove('off');}
function closeModal(){document.getElementById('modalBg').classList.add('off');}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});
function toast(msg,tipo){const el=document.getElementById('toast');el.textContent=msg;el.className='toast vis'+(tipo?' '+tipo:'');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('vis'),3500);}

// ══ INIT ══
const _c=localStorage.getItem('cli');if(_c)CLIENTES=JSON.parse(_c);
const _e=localStorage.getItem('equ');if(_e)EQUIPOS=JSON.parse(_e);
renderInicio();
</script>
